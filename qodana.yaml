# Qodana configuration — https://www.jetbrains.com/help/qodana/qodana-yaml.html
version: "1.0"

# Use the Go linter (based on GoLand) — covers Go + JS/TS inspections.
linter: jetbrains/qodana-go:2025.3

# Use the comprehensive recommended inspection profile.
profile:
  name: qodana.recommended

# Enable JavaScript and TypeScript inspections (disabled by default in qodana-go).
# This covers inline JS in Go HTML templates (AlpineJS, HTMX attributes, fetch calls).
inspections:
  - group: "category:JavaScript and TypeScript"
    enabled: true

# Exclude paths that should not be analyzed.
exclude:
  - name: All
    paths:
      - node_modules
      - vendor
      - .docker-data
      - deploy
      - work
      - e2e
